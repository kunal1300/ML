name: helmet_detection
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - glib
  - libgl-devel
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cpu
    - torch
    - torchvision
    - ultralytics
    - streamlit
    - opencv-python-headless
    - numpy
    - pillow
    - pyyaml
    - libgl1
    - ffmpeg
    - io
    - os 
    - glob
    - time
    - pathlib
    - tempfile
    - shutil
    - sys
    - cv2
    - torch
    - Image
    - yaml
